dataset:
  name: "kreimanlab/HumorDB"
  image_size: 224
  batch_size: 32
  validation_split: 0.2
  seed: 42

training:
  epochs: 20
  learning_rate: 0.001
  early_stopping_patience: 5
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

inference:
  model_path: "checkpoints/best_model.keras"
  confidence_threshold: 0.5

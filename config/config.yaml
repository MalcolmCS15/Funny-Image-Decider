model:
  pretrained: true              # true = use pretrained backbone, false = custom CNN
  backbone: "EfficientNetB0"        # MobileNetV2(3.4M), EfficientNetB0 (5.3M), ResNet50 (25.6M), VGG16 (138M), etc.
  freeze_backbone: true          # Freeze pretrained weights (feature extraction only)
  classifier_units: 128          # Dense layer size before output
  classifier_dropout: 0.5        # Dropout rate in classifier head

dataset:
  name: "kreimanlab/HumorDB"
  image_size: 224
  batch_size: 32
  validation_split: 0.2
  seed: 42

training:
  epochs: 10
  learning_rate: 0.001
  early_stopping_patience: 5
  shuffle_buffer_size: 1000
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

inference:
  model_path: "checkpoints/EfficientNetB0_best.keras"
  confidence_threshold: 0.5
 
output:
  dir: "outputs"
  num_gradcam_samples: 5
  # Filenames for each output. Set to "" to skip generating that output.
  loss_curve: "EfficientNetB0_loss_curve.png"
  accuracy_curve: "EfficientNetB0_accuracy_curve.png"
  gradcam: "EfficientNetB0_gradcam.png"
